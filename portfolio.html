  <style>
    /* ── PASSWORD GATE ── */
    .gate {
      position: fixed;
      inset: 0;
      z-index: 900;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gate__vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .gate__glow {
      position: absolute;
      top: -80px;
      right: -80px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(204,255,0,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    .gate__content {
      position: relative;
      z-index: 2;
      max-width: 480px;
      width: 100%;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ── Label ── */
    .gate__label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-label);
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 24px;
    }

    .gate__label-line {
      display: inline-block;
      width: 24px;
      height: 1px;
      background: var(--color-accent);
      opacity: 0.5;
    }

    .gate__label-dot {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--color-accent);
      animation: gateBlink 1.4s ease-in-out infinite;
      margin-left: 6px;
    }

    @keyframes gateBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.15; }
    }

    /* ── Heading ── */
    .gate__heading {
      font-family: var(--font-heading);
      font-size: clamp(36px, 5vw, 64px);
      color: var(--color-text);
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .gate__heading em {
      font-family: var(--font-accent);
      font-style: italic;
      color: var(--color-accent);
    }

    /* ── Subtext ── */
    .gate__subtext {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 15px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 40px;
    }

    /* ── Input wrapper (corner brackets) ── */
    .gate__input-wrap {
      position: relative;
      width: 100%;
      max-width: 360px;
      margin-bottom: 16px;
    }

    .gate__input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: none;
      border-top: 1.5px solid rgba(204,255,0,0.6);
      border-radius: var(--radius-card);
      padding: 16px 20px;
      color: #fff;
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 15px;
      text-align: center;
      letter-spacing: 0.2em;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .gate__input::placeholder {
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.2em;
    }

    /* Bottom-left L-bracket */
    .gate__input-wrap::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 20px;
      height: 20px;
      border-left: 1.5px solid rgba(204,255,0,0.6);
      border-bottom: 1.5px solid rgba(204,255,0,0.6);
      border-bottom-left-radius: var(--radius-card);
      pointer-events: none;
      transition: border-color 0.3s ease;
    }

    /* Bottom-right L-bracket */
    .gate__input-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      border-right: 1.5px solid rgba(204,255,0,0.6);
      border-bottom: 1.5px solid rgba(204,255,0,0.6);
      border-bottom-right-radius: var(--radius-card);
      pointer-events: none;
      transition: border-color 0.3s ease;
    }

    /* Focus state */
    .gate__input:focus {
      border-top-color: rgba(204,255,0,1);
      box-shadow: inset 0 0 20px rgba(204,255,0,0.06);
    }

    .gate__input:focus ~ .gate__input-wrap::before,
    .gate__input-wrap:focus-within::before {
      border-color: rgba(204,255,0,1);
    }

    .gate__input-wrap:focus-within::after {
      border-color: rgba(204,255,0,1);
    }

    /* Error state */
    .gate__input-wrap.is-error::before,
    .gate__input-wrap.is-error::after {
      border-color: rgba(255,80,80,0.8);
    }

    .gate__input-wrap.is-error .gate__input {
      border-top-color: rgba(255,80,80,0.8);
    }

    /* ── Submit button ── */
    .gate__submit {
      width: 100%;
      max-width: 360px;
      background: var(--color-accent);
      color: #000;
      border: none;
      border-radius: var(--radius-button);
      padding: 14px 32px;
      font-family: var(--font-button);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .gate__submit:hover {
      opacity: 0.85;
      transform: scale(1.02);
    }

    /* ── Feedback messages ── */
    .gate__feedback {
      height: 20px;
      margin-top: 10px;
      font-family: var(--font-label);
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-align: center;
    }

    .gate__feedback--success {
      color: var(--color-accent);
    }

    .gate__feedback--error {
      color: rgba(255,80,80,0.9);
    }

    /* ── Request access link ── */
    .gate__request {
      margin-top: 32px;
      font-family: var(--font-body);
      font-size: 13px;
      color: rgba(255,255,255,0.3);
    }

    .gate__request a {
      color: var(--color-accent);
      text-decoration: none;

    }

    .gate__request a:hover {

    }

    /* ── Portfolio content (post-access) ── */

    .portfolio__heading {

    }

    .portfolio__heading em {

    }

    .portfolio__text {

      color: rgba(255,255,255,0.45);
      max-width: 420px;
    }

    /* ── Nav active state for portfolio page ── */
    .nav__portfolio-btn.is-active {
      opacity: 0.4;
      pointer-events: none;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" integrity="sha384-g4NTh/Iv5PPU4xPyhEWqPcwtNXOvdaDI8LLnyYfyNZOjKJeYQyjzQ9X5275eBjpt" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js" integrity="sha384-tKsJDT6PlUI0pSBt9/sBKJluKgA19/a6mBrDsZaXotLB4ZYfMGM6xt6/WgGpYhTm" crossorigin="anonymous"></script>

  <script>
    (() => {
      /* ── Lenis smooth scroll ── */
      if (typeof Lenis !== 'undefined') {
        const isTouchDevice = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
        window.lenis = new Lenis({
          duration: 1.6,
          easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
          smoothWheel: !isTouchDevice,
          smoothTouch: false,
          syncTouch: false,
        });
        gsap.ticker.add((time) => { window.lenis.raf(time * 1000); });
        gsap.ticker.lagSmoothing(0);
      }

      /* ── Init starfield ── */
      const starCanvas = document.getElementById('starfield-canvas');
      if (starCanvas && typeof Starfield !== 'undefined') {
        Starfield.init(starCanvas);
      }

      /* ── Hamburger menu ── */
      (function initMenu() {
        const menuBtn = document.querySelector('.nav__menu-btn');
        const overlay = document.getElementById('menu-overlay');
        const links   = overlay.querySelectorAll('[data-menu-link]');
        let isOpen = false;

        menuBtn.addEventListener('click', () => {
          isOpen = !isOpen;
          menuBtn.classList.toggle('is-open', isOpen);
          menuBtn.setAttribute('aria-expanded', isOpen);

          if (isOpen) {
            overlay.style.visibility = 'visible';
            overlay.classList.add('is-open');
            gsap.to(overlay, { opacity: 1, duration: 0.4, ease: 'power2.out' });
          } else {
            overlay.classList.remove('is-open');
            gsap.to(overlay, {
              opacity: 0,
              duration: 0.3,
              ease: 'power2.in',
              onComplete: () => { overlay.style.visibility = 'hidden'; }
            });
          }
        });

        // Close on link click
        links.forEach(link => {
          link.addEventListener('click', () => {
            isOpen = false;
            menuBtn.classList.remove('is-open');
            menuBtn.setAttribute('aria-expanded', 'false');
            overlay.classList.remove('is-open');
            gsap.to(overlay, {
              opacity: 0,
              duration: 0.3,
              ease: 'power2.in',
              onComplete: () => { overlay.style.visibility = 'hidden'; }
            });
          });
        });

        // Close on Escape + focus trap
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && isOpen) {
            isOpen = false;
            menuBtn.classList.remove('is-open');
            menuBtn.setAttribute('aria-expanded', 'false');
            gsap.to(overlay, {
              opacity: 0,
              duration: 0.3,
              ease: 'power2.in',
              onComplete: () => { overlay.style.visibility = 'hidden'; }
            });
            menuBtn.focus();
          }
          // Focus trap
          if (e.key === 'Tab' && isOpen) {
            const focusable = overlay.querySelectorAll('a[href], button');
            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            if (e.shiftKey && document.activeElement === first) {
              e.preventDefault();
              last.focus();
            } else if (!e.shiftKey && document.activeElement === last) {
              e.preventDefault();
              first.focus();
            }
          }
        });

        // Set initial state
        overlay.style.opacity = '0';
        overlay.style.visibility = 'hidden';
      })();

    })();
  </script>
