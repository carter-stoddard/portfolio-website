  <style>
    /* ── Layout ── */
    body.page-404 {
      overflow: hidden;
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #000;
    }

    .four04-wrapper {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 40px;
      box-sizing: border-box;
    }

    /* ── Background: CSS Earth globe (same as contact section) ── */
    .four04-earth {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(400px, 50vw, 600px);
      height: clamp(400px, 50vw, 600px);
      border-radius: 50%;
      overflow: hidden;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }

    .four04-earth .planet-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
    }

    .four04-earth .night {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background-image: url(https://www.solarsystemscope.com/textures/download/2k_earth_nightmap.jpg);
      background-size: cover;
      background-position: center;
      animation: earthRotate 80s linear infinite;
    }

    .four04-earth .day {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background-image: url(https://www.solarsystemscope.com/textures/download/2k_earth_daymap.jpg);
      background-size: cover;
      background-position: center;
      animation: earthRotate 80s linear infinite;
      mask-image: linear-gradient(to right, transparent 30%, black 70%);
      -webkit-mask-image: linear-gradient(to right, transparent 30%, black 70%);
    }

    .four04-earth .clouds {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background-image: url(https://www.solarsystemscope.com/textures/download/2k_earth_clouds.jpg);
      background-size: cover;
      background-position: center;
      animation: earthRotate 50s linear infinite;
      opacity: 0.3;
      mix-blend-mode: screen;
    }

    .four04-earth .inner-shadow {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 50%, transparent 20%, rgba(0, 0, 0, 0.8) 80%);
    }

    @keyframes earthRotate {
      from { background-position: 0% center; }
      to   { background-position: 200% center; }
    }

    /* ── Background: 404 watermark ── */
    .four04-watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-heading);
      font-size: clamp(200px, 35vw, 400px);
      color: rgba(255,255,255,0.03);
      z-index: 1;
      pointer-events: none;
      letter-spacing: -0.02em;
      line-height: 1;
      white-space: nowrap;
      user-select: none;
    }

    /* ── Foreground content ── */
    .four04-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .four04-line {
      width: 40px;
      height: 1px;
      background: rgba(204,255,0,0.3);
      margin-bottom: 20px;
    }

    .four04-italic {
      font-family: var(--font-accent);
      font-size: clamp(24px, 3.5vw, 48px);
      font-style: italic;
      color: #CCFF00;
      color: var(--color-accent);
      margin: 0 0 16px;
      line-height: 1.2;
    }

    .four04-heading {
      font-family: var(--font-heading);
      font-size: clamp(32px, 5vw, 72px);
      color: #fff;
      text-transform: uppercase;
      margin: 0 0 24px;
      line-height: 1.1;
    }

    .four04-subtext {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: clamp(14px, 1.5vw, 18px);
      color: rgba(255,255,255,0.45);
      margin: 0 0 48px;
      line-height: 1.5;
    }

    .four04-cta {
      display: inline-block;
      font-family: var(--font-button);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: var(--color-accent);
      color: #000;
      border-radius: 14px;
      padding: 14px 36px;
      text-decoration: none;
      margin-bottom: 24px;
      transition: opacity 0.2s, transform 0.2s;
    }

    .four04-cta:hover {
      opacity: 0.85;
      transform: scale(1.02);
    }

    .four04-secondary {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.2s;
    }

    .four04-secondary:hover {
      color: var(--color-accent);
    }

    /* ── Floating astronaut ── */
    .four04-astronaut {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(120px, 15vw, 220px);
      opacity: 0;
      pointer-events: none;
      z-index: 2;
    }

    /* ── Nav wordmark for sub-pages ── */
    .nav__portfolio-btn.is-active {
      opacity: 0.5;
      pointer-events: none;
    }

    /* ── Mobile ── */
    @media (max-width: 767px) {
      .four04-wrapper {
        padding: 0 20px;
      }

      .four04-earth {
        width: 90vw;
        opacity: 0.08;
      }

      .four04-watermark {
        font-size: clamp(140px, 40vw, 200px);
      }

      .four04-cta {
        width: 100%;
        max-width: 300px;
        text-align: center;
        box-sizing: border-box;
      }

      .four04-astronaut {
        width: 140px;
        bottom: 10%;
      }
    }
  </style>
</head>

  <!-- ============================================================
       SCRIPTS
  ============================================================ -->

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" integrity="sha384-g4NTh/Iv5PPU4xPyhEWqPcwtNXOvdaDI8LLnyYfyNZOjKJeYQyjzQ9X5275eBjpt" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" integrity="sha384-Z3REaz79l2IaAZqJsSABtTbhjgOUYyV3p90XNnAPCSHg3EMTz1fouunq9WZRtj3d" crossorigin="anonymous"></script>

  <!-- Starfield -->
  <script src="js/starfield.js"></script>

  <!-- 404 entry animations + hamburger menu -->
  <script>
    (function() {
      'use strict';

      document.addEventListener('DOMContentLoaded', () => {

        /* ── Starfield ── */
        const starCanvas = document.getElementById('starfield-canvas');
        if (starCanvas) Starfield.init(starCanvas);

        /* ── Entry animation timeline ── */
        const tl = gsap.timeline({ defaults: { ease: 'power2.out' } });

        // Background elements — fade in (no y movement)
        const bgEls = document.querySelectorAll('[data-404-bg]');
        bgEls.forEach(el => { gsap.set(el, { opacity: 0 }); });

        tl.to(bgEls, {
          opacity: (i, el) => {
            // Restore to their CSS-defined opacity
            if (el.classList.contains('four04-earth')) {
              return window.innerWidth <= 767 ? 0.08 : 0.10;
            }
            return 0.03; // watermark
          },
          duration: 1.2
        });

        // Foreground elements — staggered fade in with y movement
        const fgEls = document.querySelectorAll('[data-404-fg]');
        fgEls.forEach(el => { gsap.set(el, { opacity: 0, y: 20 }); });

        tl.to(fgEls, {
          opacity: 1,
          y: 0,
          duration: 0.7,
          stagger: 0.2
        }, '-=0.8');

        // Astronaut — fade in after 1.5s delay, then float
        const astronaut = document.getElementById('four04-astronaut');
        if (astronaut) {
          gsap.set(astronaut, { opacity: 0 });

          gsap.to(astronaut, {
            opacity: 0.35,
            duration: 0.8,
            delay: 1.5,
            ease: 'power2.out',
            onComplete: () => {
              // Start idle float animation
              gsap.to(astronaut, {
                y: 12,
                rotation: 2,
                duration: 4,
                ease: 'sine.inOut',
                yoyo: true,
                repeat: -1
              });
            }
          });
        }

        /* ── Hamburger menu (self-contained for 404 page) ── */
        const menuBtn = document.querySelector('.nav__menu-btn');
        const overlay = document.getElementById('menu-overlay');
        const links   = overlay.querySelectorAll('[data-menu-link]');
        let isOpen = false;

        menuBtn.addEventListener('click', () => {
          isOpen = !isOpen;
          menuBtn.classList.toggle('is-open', isOpen);
          menuBtn.setAttribute('aria-expanded', isOpen);

          if (isOpen) {
            overlay.style.visibility = 'visible';
            gsap.to(overlay, { opacity: 1, duration: 0.4, ease: 'power2.out' });
          } else {
            gsap.to(overlay, {
              opacity: 0,
              duration: 0.3,
              ease: 'power2.in',
              onComplete: () => { overlay.style.visibility = 'hidden'; }
            });
          }
        });

        // Close on link click
        links.forEach(link => {
          link.addEventListener('click', () => {
            isOpen = false;
            menuBtn.classList.remove('is-open');
            menuBtn.setAttribute('aria-expanded', 'false');
            gsap.to(overlay, {
              opacity: 0,
              duration: 0.3,
              ease: 'power2.in',
              onComplete: () => { overlay.style.visibility = 'hidden'; }
            });
          });
        });

        // Close on Escape
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && isOpen) {
            isOpen = false;
            menuBtn.classList.remove('is-open');
            menuBtn.setAttribute('aria-expanded', 'false');
            gsap.to(overlay, {
              opacity: 0,
              duration: 0.3,
              ease: 'power2.in',
              onComplete: () => { overlay.style.visibility = 'hidden'; }
            });
          }
        });

        // Set initial state
        overlay.style.opacity = '0';
        overlay.style.visibility = 'hidden';

      });
    })();
  </script>
